<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orgeral — Entrar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0e0e0e; color: #e8e8e8;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #161616; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 44px 36px;
      width: 380px; max-width: 95vw; text-align: center;
    }
    .logo { margin-bottom: 32px; }
    .logo-icon { font-size: 36px; display: block; margin-bottom: 8px; }
    .logo-text  { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
    .subtitle { font-size: 13px; color: #888; margin-top: 6px; }

    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 13px 20px;
      background: #fff; color: #111;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
      margin-top: 24px; text-decoration: none;
    }
    .btn-google:hover { opacity: .9; }
    .btn-google svg { flex-shrink: 0; }

    .divider { margin: 24px 0 0; color: #444; font-size: 12px; }
    .features {
      margin-top: 28px; text-align: left;
      display: flex; flex-direction: column; gap: 10px;
    }
    .feature {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #888;
    }
    .feature-icon { font-size: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">◈</span>
    <span class="logo-text">Orgeral</span>
    <p class="subtitle">Organize sua vida escolar com IA</p>
  </div>

  {% if error %}
  <div style="background:#2a1414;border:1px solid #4a2020;color:#e07070;font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:8px">
    Não foi possível entrar. Tente novamente.
  </div>
  {% endif %}

  <a href="/login/google" class="btn-google">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Entrar com Google
  </a>

  <p class="divider">Suas tarefas ficam salvas na sua conta Google</p>

  <div class="features">
    <div class="feature"><span class="feature-icon">📅</span> Calendário de atividades</div>
    <div class="feature"><span class="feature-icon">🤖</span> IA extrai tarefas da sistemática</div>
    <div class="feature"><span class="feature-icon">✓</span> Checklist e controle de conclusão</div>
    <div class="feature"><span class="feature-icon">🎨</span> Cores por matéria</div>
  </div>
</div>
</body>
</html>
