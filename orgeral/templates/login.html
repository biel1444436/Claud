<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orgeral — Entrar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
      --border: #2a2a2a; --text: #e8e8e8; --text-muted: #888;
      --accent: #d4d4d4; --danger: #c0392b; --success: #27ae60;
      --radius: 8px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 36px 32px; width: 360px; max-width: 95vw;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon { font-size: 22px; }
    .logo-text  { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 9px; text-align: center; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      background: none; border: none; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 14px;
      padding: 10px 12px; margin-bottom: 12px; outline: none;
      transition: border-color .2s; font-family: inherit;
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: #555; }
    .btn {
      width: 100%; padding: 11px; border-radius: var(--radius); border: none;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
      background: var(--accent); color: #111; margin-top: 4px;
    }
    .btn:hover { opacity: .88; }
    .error-msg {
      background: rgba(192,57,43,.12); border: 1px solid #4a2020;
      color: #e07070; font-size: 12px; padding: 9px 12px;
      border-radius: var(--radius); margin-bottom: 12px; display: none;
    }
    .success-msg {
      background: rgba(39,174,96,.12); border: 1px solid #1e4d2e;
      color: #5dba7d; font-size: 12px; padding: 9px 12px;
      border-radius: var(--radius); margin-bottom: 12px; display: none;
    }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">◈</span>
    <span class="logo-text">Orgeral</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="showTab('login')">Entrar</button>
    <button class="tab" id="tabRegister" onclick="showTab('register')">Criar conta</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>

  <!-- Login form -->
  <form id="loginForm" onsubmit="doLogin(event)">
    <input type="text" class="input" id="loginUser" placeholder="Usuário" autocomplete="username" required />
    <input type="password" class="input" id="loginPass" placeholder="Senha" autocomplete="current-password" required />
    <button type="submit" class="btn">Entrar</button>
  </form>

  <!-- Register form -->
  <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
    <input type="text" class="input" id="regUser" placeholder="Usuário (mínimo 3 caracteres)" autocomplete="username" required />
    <input type="password" class="input" id="regPass" placeholder="Senha (mínimo 6 caracteres)" autocomplete="new-password" required />
    <input type="password" class="input" id="regPass2" placeholder="Confirmar senha" autocomplete="new-password" required />
    <button type="submit" class="btn">Criar conta</button>
  </form>

  <p class="hint">Suas tarefas ficam salvas na sua conta.</p>
</div>

<script>
  function showTab(tab) {
    const isLogin = tab === "login";
    document.getElementById("loginForm").style.display = isLogin ? "" : "none";
    document.getElementById("registerForm").style.display = isLogin ? "none" : "";
    document.getElementById("tabLogin").classList.toggle("active", isLogin);
    document.getElementById("tabRegister").classList.toggle("active", !isLogin);
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = msg; el.style.display = "";
    document.getElementById("successMsg").style.display = "none";
  }

  function showSuccess(msg) {
    const el = document.getElementById("successMsg");
    el.textContent = msg; el.style.display = "";
    document.getElementById("errorMsg").style.display = "none";
  }

  function clearMessages() {
    document.getElementById("errorMsg").style.display = "none";
    document.getElementById("successMsg").style.display = "none";
  }

  async function doLogin(e) {
    e.preventDefault();
    clearMessages();
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("loginUser").value.trim(),
        password: document.getElementById("loginPass").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error);
    window.location.href = "/";
  }

  async function doRegister(e) {
    e.preventDefault();
    clearMessages();
    const pass = document.getElementById("regPass").value;
    const pass2 = document.getElementById("regPass2").value;
    if (pass !== pass2) return showError("As senhas não coincidem.");

    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("regUser").value.trim(),
        password: pass,
      }),
    });
    const data = await res.json();
    if (!res.ok) return showError(data.error);
    showSuccess("Conta criada! Entrando...");
    setTimeout(() => window.location.href = "/", 800);
  }
</script>
</body>
</html>
