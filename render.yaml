services:
  - type: web
    name: nexus-studio
    runtime: static
    staticPublishPath: agencia
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600

  - type: web
    name: orgeral
    runtime: python
    rootDir: orgeral
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: orgeral-db
          property: connectionString

databases:
  - name: orgeral-db
    databaseName: orgeral
    plan: free
