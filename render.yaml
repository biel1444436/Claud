# Deploy do Orgeral no Render (https://render.com)
# O app fica na subpasta orgeral/ (rootDir). Suba o repo no GitHub e use
# "New > Blueprint" apontando para este arquivo.
services:
  - type: web
    name: orgeral
    runtime: python
    rootDir: orgeral
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: CAL_TIMEZONE
        value: America/Sao_Paulo
      - key: DATABASE_URL
        fromDatabase:
          name: orgeral-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false           # cadastre no painel (secreto)
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: orgeral-db
    databaseName: orgeral
    plan: free
